<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal D1 Login</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center p-4">

    <!-- Minimal Card Container -->
    <div class="w-full max-w-sm bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl space-y-5">
        
        <!-- Simple Header -->
        <div class="text-center space-y-1">
            <h1 class="text-xl font-bold text-white">Access Portal</h1>
            <p class="text-xs text-slate-400">Database Authentication Test</p>
        </div>

        <!-- Database Status Info Box -->
        <div id="statusBox" class="p-3 bg-slate-950 rounded-xl border border-slate-800 flex items-center justify-between text-xs">
            <span class="text-slate-400 font-medium">Database Status:</span>
            <span id="statusText" class="flex items-center gap-2 font-semibold text-amber-400">
                <span id="statusDot" class="w-2.5 h-2.5 rounded-full bg-amber-400 animate-pulse"></span>
                <span>Checking...</span>
            </span>
        </div>

        <!-- Minimal Login Form -->
        <form id="loginForm" class="space-y-4">
            <div>
                <label for="username" class="block text-xs font-medium text-slate-300 mb-1">Username</label>
                <input type="text" id="username" required placeholder="Enter username"
                    class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-orange-500 transition">
            </div>

            <div>
                <label for="password" class="block text-xs font-medium text-slate-300 mb-1">Password</label>
                <input type="password" id="password" required placeholder="Enter password"
                    class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-orange-500 transition">
            </div>

            <button type="submit" id="submitBtn"
                class="w-full py-2.5 bg-orange-600 hover:bg-orange-500 text-white rounded-lg text-sm font-semibold transition shadow-lg shadow-orange-600/20">
                Log In
            </button>
        </form>

        <!-- Login Result Alert Banner -->
        <div id="resultBanner" class="hidden p-3 rounded-lg text-xs font-medium text-center transition"></div>

    </div>

    <script src="script.js"></script>
</body>
</html>
