<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DORMITORATION - Admin Control Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --dark: #0f111a;
            --deeper: #151824;
            --card-bg: #1f2335;
            --light: #f5f6fa;
            --muted: #787c99;
            --primary: #7aa2f7;
            --accent: #7dcfff;
            --success: #9ece6a;
            --danger: #f7768e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--dark); color: var(--light); min-height: 100vh; display: flex; }
        
        /* Sidebar layout styling */
        .sidebar { width: 260px; background-color: var(--deeper); padding: 30px 20px; display: flex; flex-direction: column; gap: 40px; border-right: 1px solid rgba(255,255,255,0.05); }
        .brand h2 { font-weight: 800; font-size: 1.4rem; color: var(--primary); letter-spacing: 1px; }
        .brand span { color: var(--light); }
        .nav-links { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        .nav-links a { display: flex; align-items: center; gap: 15px; color: var(--muted); padding: 12px 16px; text-decoration: none; border-radius: 8px; font-weight: 500; transition: 0.2s; }
        .nav-links a.active, .nav-links a:hover { background: rgba(122, 162, 247, 0.1); color: var(--primary); }
        
        /* Main Workspace Panel */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-size: 1.8rem; font-weight: 700; }
        
        /* Metrics Grid Layout */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card-bg); padding: 24px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.02); display: flex; flex-direction: column; gap: 8px; }
        .stat-card .label { font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card .value { font-size: 2rem; font-weight: 700; color: var(--accent); }
        
        /* Data Tables */
        .data-section { background: var(--card-bg); padding: 24px; border-radius: 12px; margin-bottom: 30px; }
        .data-section h3 { margin-bottom: 20px; font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 12px 16px; color: var(--muted); font-size: 0.85rem; text-transform: uppercase; border-bottom: 2px solid rgba(255,255,255,0.05); }
        td { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        .status-badge.available { background: rgba(158, 206, 106, 0.15); color: var(--success); }
        .status-badge.full { background: rgba(247, 118, 142, 0.15); color: var(--danger); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand"><h2>DORMITOR<span>ATION</span></h2></div>
        <ul class="nav-links">
            <li><a href="#" class="active"><i class="fas fa-chart-pie"></i> Overview</a></li>
            <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="header">
            <div>
                <h1>System Overview</h1>
                <p style="color: var(--muted); font-size: 0.85rem;">Live tracking metrics from D1 SQL Infrastructure</p>
            </div>
        </header>

        <!-- Dynamic Summary Row -->
        <div class="stats-grid">
            <div class="stat-card">
                <span class="label">Total Managed Rooms</span>
                <span class="value" id="totalRooms">--</span>
            </div>
            <div class="stat-card">
                <span class="label">Total Occupants</span>
                <span class="value" id="totalOccupants">--</span>
            </div>
            <div class="stat-card">
                <span class="label">System Incidents</span>
                <span class="value" style="color: var(--success)">0</span>
            </div>
        </div>

        <!-- Rooms Matrix Table Section -->
        <div class="data-section">
            <h3><i class="fas fa-door-open" style="color: var(--primary)"></i> Room Allocations Status</h3>
            <table>
                <thead>
                    <tr>
                        <th>Room Number</th>
                        <th>Block</th>
                        <th>Occupancy Status</th>
                        <th>Capacity metrics</th>
                    </tr>
                </thead>
                <tbody id="roomsTableBody">
                    <tr>
                        <td colspan="4" style="text-align: center; color: var(--muted);">Requesting stream updates...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        // Security Intercept Guard Check
        if (localStorage.getItem('isLoggedIn') !== 'true' || localStorage.getItem('userRole') !== 'admin') {
            window.location.href = 'test_login.html';
        }

        // Fetch metrics function
        async function loadDashboardMetrics() {
            try {
                const response = await fetch('/api/dashboard_metrics');
                if (!response.ok) throw new Error("API call down.");
                const data = await response.json();

                if (data.success) {
                    // Update quick cards
                    document.getElementById('totalRooms').textContent = data.summary.totalRooms;
                    document.getElementById('totalOccupants').textContent = data.summary.totalOccupants;

                    // Parse out rows
                    const tbody = document.getElementById('roomsTableBody');
                    tbody.innerHTML = ''; // wipe loader

                    data.rooms.forEach(room => {
                        const tr = document.createElement('tr');
                        const badgeClass = room.status.toLowerCase() === 'available' ? 'available' : 'full';
                        
                        tr.innerHTML = `
                            <td style="font-weight: 600;">${room.room_number}</td>
                            <td>${room.block}</td>
                            <td><span class="status-badge ${badgeClass}">${room.status}</span></td>
                            <td><strong>${room.current_occupants}</strong> / ${room.capacity} beds filled</td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
            } catch (err) {
                console.error("Dashboard link failed:", err);
            }
        }

        // Basic Logout routine
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.clear();
            window.location.href = 'test_login.html';
        });

        // Query data immediately on load
        loadDashboardMetrics();
    </script>
</body>
</html>
